services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      SECRET_KEY: change-this-secret
      FRONTEND_ORIGIN: http://localhost:5173
    ports:
      - "5000:5000"
    volumes:
      - backend_artifacts:/app/artifacts

  frontend:
    build:
      context: frontend
    environment:
      VITE_API_URL: http://localhost:5000/api
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  backend_artifacts:
